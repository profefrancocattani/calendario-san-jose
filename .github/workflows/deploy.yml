# Este archivo va en .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnóstico de archivos
        # Ahora listamos lo que hay adentro de la subcarpeta para estar seguros
        run: ls -R calendario-san-jose 

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Le decimos que trabaje adentro de la carpeta correcta
        working-directory: calendario-san-jose
        run: npm install --no-package-lock 

      - name: Build
        # También acá tiene que entrar a la carpeta
        working-directory: calendario-san-jose
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Le indicamos que el resultado (dist) está adentro de la subcarpeta
          path: './calendario-san-jose/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4